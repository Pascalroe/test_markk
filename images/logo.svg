<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0f0f1a" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- M -->
  <text x="100" y="85" font-family="Georgia, serif" font-size="70" font-weight="700" fill="url(#grad)" text-anchor="middle">mk</text>
  
  <!-- Underline accent -->
  <rect x="45" y="100" width="110" height="4" rx="2" fill="url(#grad)"/>
  
  <!-- Decorative dots -->
  <circle cx="55" cy="145" r="6" fill="#e94560"/>
  <circle cx="100" cy="145" r="6" fill="#e94560" opacity="0.7"/>
  <circle cx="145" cy="145" r="6" fill="#e94560" opacity="0.4"/>
</svg>